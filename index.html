<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КСК — Гайд по классам | Лингидан</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0e0303;
    --bg-dark: #1a0505;
    --bg-card: #200808;
    --bg-panel: #180404;
    --bg-hover: #2d0d0d;
    --crimson: #8B1A1A;
    --crimson-light: #C0392B;
    --crimson-mid: #6b1515;
    --gold: #D4AF37;
    --gold-light: #F0CC5A;
    --gold-dim: #8B7120;
    --text-primary: #F5E6C8;
    --text-secondary: #C9A96E;
    --text-muted: #7a5c3a;
    --border: rgba(212,175,55,0.15);
    --border-hover: rgba(212,175,55,0.4);
    --border-active: rgba(212,175,55,0.7);
    --glow: 0 0 20px rgba(212,175,55,0.12);
    --glow-active: 0 0 30px rgba(212,175,55,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0e0303 0%, rgba(14,3,3,0.95) 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 64px;
  }

  .logo-crown {
    font-size: 22px;
    color: var(--gold);
    filter: drop-shadow(0 0 6px rgba(212,175,55,0.5));
  }

  .site-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .site-subtitle {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(212,175,55,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    transition: border-color 0.2s;
  }

  .search-box:focus-within {
    border-color: var(--border-hover);
  }

  .search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    width: 180px;
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .search-icon { color: var(--text-muted); font-size: 14px; }

  /* LAYOUT */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg-dark);
    padding: 1.5rem 1rem;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--crimson) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--crimson); border-radius: 2px; }

  .sidebar-section {
    margin-bottom: 0.5rem;
  }

  .sidebar-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 0 0.5rem;
    margin-bottom: 0.5rem;
    margin-top: 1rem;
    display: block;
  }

  .class-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }

  .class-btn {
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--text-secondary);
    text-align: center;
    padding: 3px;
    line-height: 1.2;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .class-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,175,55,0.08) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .class-btn:hover {
    border-color: var(--border-hover);
    background: var(--bg-hover);
    color: var(--text-primary);
    box-shadow: var(--glow);
    transform: translateY(-1px);
  }

  .class-btn:hover::before { opacity: 1; }

  .class-btn.active {
    border-color: var(--gold);
    background: rgba(212,175,55,0.12);
    color: var(--gold-light);
    box-shadow: var(--glow-active), inset 0 0 12px rgba(212,175,55,0.06);
  }

  .class-btn.active::before { opacity: 1; }

  .class-icon-wrap {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--crimson-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2px;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* MAIN CONTENT */
  .main-content {
    padding: 2rem;
    min-height: calc(100vh - 64px);
  }

  /* WELCOME STATE */
  .welcome-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 1rem;
  }

  .welcome-crown {
    font-size: 4rem;
    color: var(--gold);
    filter: drop-shadow(0 0 20px rgba(212,175,55,0.3));
    animation: pulse-gold 3s ease-in-out infinite;
  }

  @keyframes pulse-gold {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(212,175,55,0.3)); }
    50% { filter: drop-shadow(0 0 35px rgba(212,175,55,0.5)); }
  }

  .welcome-title {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.06em;
  }

  .welcome-sub {
    color: var(--text-muted);
    font-size: 0.9rem;
    max-width: 360px;
    line-height: 1.6;
  }

  .ornament {
    color: var(--gold-dim);
    font-size: 1.2rem;
    letter-spacing: 0.5em;
  }

  /* CLASS PANEL */
  .class-panel {
    display: none;
    animation: slideIn 0.25s ease;
  }

  .class-panel.visible { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(16px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .panel-header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 80px;
    height: 1px;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }

  .class-avatar {
    width: 72px;
    height: 72px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--crimson) 0%, var(--bg-card) 100%);
    border: 2px solid var(--border-active);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(212,175,55,0.15);
  }

  .panel-title-block { flex: 1; }

  .panel-class-name {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }

  .panel-type-badge {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
  }

  /* TABS */
  .tab-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0.5rem 1rem;
    letter-spacing: 0.05em;
    position: relative;
    transition: color 0.2s;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
  }

  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tab-btn:hover { color: var(--text-secondary); }

  .tab-btn.active {
    color: var(--gold);
  }

  .tab-btn.active::after { opacity: 1; }

  /* TAB CONTENT */
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ABILITY CARDS */
  .abilities-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .ability-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .ability-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--crimson);
  }

  .ability-card.ult::before { background: var(--gold); }
  .ability-card.shard::before { background: #9b59b6; }
  .ability-card.passive::before { background: #2980b9; }

  .ability-card:hover { border-color: var(--border-hover); }

  .ability-label {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    font-weight: 600;
  }

  .ability-label.ult { color: var(--gold-dim); }
  .ability-label.shard { color: #9b59b6; }
  .ability-label.passive { color: #2980b9; }

  .ability-desc {
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  /* BUILD SECTION */
  .build-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .build-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
  }

  .build-title {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .build-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  .build-title .dot.pve { background: #27ae60; }
  .build-title .dot.extra { background: #2980b9; }

  .build-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .build-list li {
    font-size: 0.82rem;
    color: var(--text-secondary);
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(212,175,55,0.05);
  }

  .build-list li:last-child { border-bottom: none; }

  .item-num {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: var(--gold-dim);
    min-width: 16px;
    font-weight: 600;
  }

  .item-name { color: var(--text-primary); font-weight: 400; }

  /* TIPS / COUNTER */
  .tips-block { margin-bottom: 1.5rem; }

  .tips-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 0.8rem;
    padding-left: 1rem;
    border-left: 2px solid var(--gold);
  }

  .tip-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    margin-bottom: 0.4rem;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text-secondary);
    position: relative;
    padding-left: 2rem;
  }

  .tip-item::before {
    content: '➥';
    position: absolute;
    left: 0.7rem;
    top: 0.7rem;
    color: var(--gold-dim);
    font-size: 0.75rem;
  }

  .tip-item.play-tip::before { content: '༄'; color: #2980b9; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin: 1.5rem 0 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* SCROLLBAR */
  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-thumb { background: var(--crimson); }

  /* COUNTER SECTION */
  .counter-block {
    background: rgba(139,26,26,0.15);
    border: 1px solid rgba(139,26,26,0.4);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
  }

  .counter-title {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--crimson-light);
    margin-bottom: 0.6rem;
  }

  .counter-text {
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  /* NO DATA */
  .no-data {
    color: var(--text-muted);
    font-size: 0.82rem;
    font-style: italic;
    padding: 0.5rem 0;
  }

  /* SCROLLBAR MAIN */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--crimson-mid); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-crown">♛</div>
    <div>
      <div class="site-title">КСК — Гайд по классам</div>
      <div class="site-subtitle">Cristalix · by Лингидан</div>
    </div>
    <div class="header-right">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск класса..." oninput="filterClasses(this.value)">
      </div>
    </div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <span class="sidebar-label">Все классы</span>
    <div class="class-grid" id="classGrid"></div>
  </aside>

  <!-- MAIN -->
  <main class="main-content" id="mainContent">
    <div class="welcome-state" id="welcomeState">
      <div class="welcome-crown">♛</div>
      <div class="ornament">✦ · · · ✦</div>

      <div class="ornament">✦ · · · ✦</div>
    </div>
    <div class="class-panel" id="classPanel"></div>
  </main>
</div>

let activeClass = null;
let activeTab = 'abilities';

function renderSidebar() {
  const grid = document.getElementById('classGrid');
  grid.innerHTML = classData.map((c, i) => `
    <button class="class-btn" id="btn-${i}" onclick="selectClass(${i})" title="${c.name}">
      <div>
        <div class="class-icon-wrap">${c.emoji}</div>
        <div style="font-size:0.52rem;line-height:1.2;">${c.name}</div>
      </div>
    </button>
  `).join('');
}

function filterClasses(query) {
  const q = query.toLowerCase();
  classData.forEach((c, i) => {
    const btn = document.getElementById(`btn-${i}`);
    if (!btn) return;
    btn.style.display = c.name.toLowerCase().includes(q) ? '' : 'none';
  });
}

function selectClass(index) {
  if (activeClass !== null) {
    document.getElementById(`btn-${activeClass}`)?.classList.remove('active');
  }
  activeClass = index;
  document.getElementById(`btn-${index}`)?.classList.add('active');
  activeTab = 'abilities';
  renderPanel(classData[index]);
}

function renderPanel(c) {
  document.getElementById('welcomeState').style.display = 'none';
  const panel = document.getElementById('classPanel');
  panel.className = 'class-panel visible';

  const pvpItems = c.pvpBuild.map((item, i) =>
    `<li><span class="item-num">${i+1}.</span><span class="item-name">${item}</span></li>`
  ).join('');
  const pveItems = c.pveBuild.map((item, i) =>
    `<li><span class="item-num">${i+1}.</span><span class="item-name">${item}</span></li>`
  ).join('');
  const extraItems = c.extraBuild.map((item, i) =>
    `<li><span class="item-num">${i+1}.</span><span class="item-name">${item}</span></li>`
  ).join('');

  const counterLines = c.counter.split('\n').map(l =>
    `<div class="tip-item">${l.replace(/^[➥]\s*/,'')}</div>`
  ).join('');

  const tipLines = c.tips.map(t =>
    `<div class="tip-item play-tip">${t}</div>`
  ).join('');

  panel.innerHTML = `
    <div class="panel-header">
      <div class="class-avatar">${c.emoji}</div>
      <div class="panel-title-block">
        <div class="panel-class-name">${c.name}</div>
        <div class="panel-type-badge">✦ Класс КСК · Cristalix</div>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" id="tab-abilities" onclick="switchTab('abilities')">Способности</button>
      <button class="tab-btn" id="tab-build" onclick="switchTab('build')">Закуп</button>
      <button class="tab-btn" id="tab-tips" onclick="switchTab('tips')">Советы</button>
      <button class="tab-btn" id="tab-counter" onclick="switchTab('counter')">Контра</button>
    </div>

    <div class="tab-pane active" id="pane-abilities">
      <div class="abilities-grid">
        ${c.passive && c.passive !== '—' ? `
        <div class="ability-card passive">
          <div class="ability-label passive">Пассивная способность</div>
          <div class="ability-desc">${c.passive}</div>
        </div>` : ''}
        ${c.active1 && c.active1 !== '—' ? `
        <div class="ability-card">
          <div class="ability-label">Активная способность 1</div>
          <div class="ability-desc">${c.active1}</div>
        </div>` : ''}
        ${c.active2 && c.active2 !== '—' ? `
        <div class="ability-card">
          <div class="ability-label">Активная способность 2</div>
          <div class="ability-desc">${c.active2}</div>
        </div>` : ''}
        ${c.ult && c.ult !== '—' ? `
        <div class="ability-card ult">
          <div class="ability-label ult">Ульта</div>
          <div class="ability-desc">${c.ult}</div>
        </div>` : ''}
        ${c.shard && c.shard !== '—' ? `
        <div class="ability-card shard">
          <div class="ability-label shard">Шард</div>
          <div class="ability-desc">${c.shard}</div>
        </div>` : ''}
      </div>
    </div>

    <div class="tab-pane" id="pane-build">
      <div class="build-cols">
        <div class="build-card">
          <div class="build-title"><span class="dot"></span>ПВП закуп</div>
          ${pvpItems ? `<ul class="build-list">${pvpItems}</ul>` : '<div class="no-data">Данных нет</div>'}
        </div>
        <div class="build-card">
          <div class="build-title"><span class="dot pve"></span>ПВЕ закуп</div>
          ${pveItems ? `<ul class="build-list">${pveItems}</ul>` : '<div class="no-data">Данных нет</div>'}
        </div>
      </div>
      ${extraItems ? `
      <div class="section-title">Дополнительный закуп</div>
      <div class="build-card">
        <div class="build-title"><span class="dot extra"></span>Доп. вариант</div>
        <ul class="build-list">${extraItems}</ul>
      </div>` : ''}
    </div>

    <div class="tab-pane" id="pane-tips">
      ${tipLines ? `
      <div class="tips-block">
        <div class="tips-title">Советы по игре</div>
        ${tipLines}
      </div>` : '<div class="no-data">Советы не добавлены</div>'}
    </div>

    <div class="tab-pane" id="pane-counter">
      <div class="counter-block">
        <div class="counter-title">⚔ Как контрить</div>
        <div class="counter-text">${c.counter.replace(/\n/g, '<br>')}</div>
      </div>
    </div>
  `;

  switchTab(activeTab);
}

function switchTab(tab) {
  activeTab = tab;
  ['abilities','build','tips','counter'].forEach(t => {
    document.getElementById(`tab-${t}`)?.classList.toggle('active', t === tab);
    document.getElementById(`pane-${t}`)?.classList.toggle('active', t === tab);
  });
}

renderSidebar();
</script>
