<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSK Class Guide | Cristalix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0e0303;
            --bg-gradient-end: #1a0505;
            --bg-panel: #200808;
            --accent-burgundy: #8B1A1A;
            --accent-gold: #D4AF37;
            --light-gold: #F0CC5A;
            --text-main: #F5E6C8;
            --text-secondary: #C9A96E;
            --text-muted: #7a5c3a;
            --border-gold: rgba(212, 175, 55, 0.15);
            --font-headers: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-burgundy);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        body {
            background: linear-gradient(135deg, var(--bg-main), var(--bg-gradient-end));
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(14, 3, 3, 0.9);
            border-bottom: 1px solid var(--border-gold);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: var(--font-headers);
            font-size: 1.1rem;
            font-weight: 700;
            padding: 10px 24px;
            cursor: pointer;
            position: relative;
        }

        .nav-btn.active {
            color: var(--light-gold);
            text-shadow: 0 0 10px rgba(240, 204, 90, 0.4);
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-gold);
            box-shadow: 0 0 12px var(--accent-gold);
        }

        .main-content {
            margin-top: 85px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .section-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .search-container {
            margin-bottom: 25px;
        }

        .search-container input {
            width: 100%;
            background: var(--bg-panel);
            border: 1px solid var(--border-gold);
            padding: 16px 20px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1.05rem;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.25);
        }

        .layout-wrapper {
            display: flex;
            gap: 25px;
            position: relative;
            align-items: flex-start;
            flex: 1;
        }

        .classes-grid {
            flex: 1;
            display: grid;
            /* Умная сетка: карточки от 120px, переносятся на новую строку без изменения размера */
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
            align-content: start;
        }

        .class-card {
            aspect-ratio: 1 / 1;
            background: var(--bg-panel);
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s ease, box-shadow 0.25s ease;
            user-select: none;
        }

        .class-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .class-card .fallback-icon {
            font-family: var(--font-headers);
            color: var(--light-gold);
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            text-align: center;
            padding: 8px;
            word-wrap: break-word;
        }

        .class-card:hover {
            transform: translateY(-4px);
            border-color: var(--text-secondary);
        }

        .class-card.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .class-panel {
            width: 40%;
            background: var(--bg-panel);
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            padding: 24px;
            display: none;
            flex-direction: column;
            position: sticky;
            top: 90px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 12px;
        }

        .panel-header h2 {
            font-family: var(--font-headers);
            color: var(--light-gold);
            font-size: 1.7rem;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 2.2rem;
            cursor: pointer;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--accent-gold);
        }

        .panel-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(14, 3, 3, 0.6);
            border: 1px solid var(--border-gold);
            color: var(--text-secondary);
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            border-color: var(--text-secondary);
            color: var(--text-main);
        }

        .tab-btn.active {
            background: var(--accent-gold);
            color: var(--bg-main);
            border-color: var(--accent-gold);
        }

        .info-block {
            margin-bottom: 24px;
        }

        .info-block h3 {
            font-family: var(--font-headers);
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-burgundy);
            padding-left: 10px;
        }

        .info-block.hidden {
            display: none !important;
        }

        .build-group {
            background: rgba(14, 3, 3, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.08);
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .build-title {
            font-size: 0.95rem;
            color: var(--light-gold);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .build-group ul {
            list-style: none;
            padding-left: 0;
        }

        .build-group li {
            margin-bottom: 6px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .pve-replace {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-left: 4px;
        }

        .gold-markers, .burgundy-markers {
            list-style: none;
        }

        .gold-markers li, .burgundy-markers li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .gold-markers li::before {
            content: '✦';
            position: absolute;
            left: 0;
            color: var(--accent-gold);
        }

        .burgundy-markers li::before {
            content: '✦';
            position: absolute;
            left: 0;
            color: var(--accent-burgundy);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
            border: 1px dashed var(--border-gold);
            border-radius: 6px;
        }

        #secret-update-trigger {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            background: transparent;
            z-index: 999;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.flex {
            display: flex;
        }

        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--accent-gold);
            padding: 30px;
            border-radius: 6px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .modal-content h3 {
            font-family: var(--font-headers);
            color: var(--light-gold);
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .modal-content input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-gold);
            padding: 12px;
            color: var(--text-main);
            margin-bottom: 15px;
            border-radius: 4px;
            outline: none;
            font-family: var(--font-body);
        }

        .gold-submit-btn {
            width: 100%;
            background: var(--accent-gold);
            color: var(--bg-main);
            border: none;
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            font-family: var(--font-body);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .gold-submit-btn:hover {
            background: var(--light-gold);
        }

        .sync-status {
            margin-top: 15px;
            font-size: 0.95rem;
            text-align: center;
            font-weight: 500;
        }

        .status-loading { color: var(--accent-gold); }
        .status-success { color: #4CAF50; }
        .status-error { color: #ff4d4d; }

        .hidden { display: none !important; }

        @media (max-width: 1200px) {
            .classes-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .class-panel { width: 45%; }
        }

        @media (max-width: 768px) {
            .classes-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .class-panel {
                position: fixed;
                top: 0;
                right: 0;
                width: 100%;
                height: 100vh;
                max-height: 100vh;
                z-index: 200;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <button class="nav-btn active">Гайды</button>
        </div>
    </nav>

    <main class="main-content">
        <section class="section-container">
            <div class="search-container">
                <input type="text" id="class-search" placeholder="Поиск класса по названию...">
            </div>

            <div class="layout-wrapper">
                <div id="classes-grid" class="classes-grid"></div>

                <aside id="class-panel" class="class-panel">
                    <div class="panel-header">
                        <h2 id="panel-class-name">Название</h2>
                        <button id="panel-close-btn" class="close-btn">×</button>
                    </div>
                    
                    <div class="panel-tabs">
                        <button class="tab-btn active" data-tab="all">Всё</button>
                        <button class="tab-btn" data-tab="builds">Закуп</button>
                        <button class="tab-btn" data-tab="tips">Советы</button>
                        <button class="tab-btn" data-tab="counters">Как контрить</button>
                    </div>

                    <div class="panel-body">
                        <div id="block-builds" class="info-block">
                            <h3>Закупы</h3>
                            <div id="builds-list"></div>
                        </div>
                        <div id="block-tips" class="info-block">
                            <h3>Советы</h3>
                            <ul id="tips-list" class="gold-markers"></ul>
                        </div>
                        <div id="block-counters" class="info-block">
                            <h3>Как контрить</h3>
                            <ul id="counters-list" class="burgundy-markers"></ul>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <div id="secret-update-trigger"></div>

    <div id="update-modal" class="modal">
        <div class="modal-content">
            <button id="modal-close-btn" class="close-btn" style="position: absolute; top: 10px; right: 15px;">×</button>
            <h3>Синхронизация гайдов</h3>
            <div id="modal-auth-step">
                <input type="password" id="secret-password" placeholder="Введите пароль">
                <button id="auth-submit-btn" class="gold-submit-btn">Войти</button>
            </div>
            <div id="modal-sync-step" class="hidden">
                <button id="sync-now-btn" class="gold-submit-btn">Загрузить из Google Таблицы</button>
            </div>
            <div id="sync-status" class="sync-status"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJUnezlHjqNTBs6LlMvoDxvg8KyigoOZ5qQ-WJgTi7Hu_5yeiUJ2o55wwzWsprCdKElWeiyutCzrs5/pub?gid=801491780&single=true&output=csv";

        let currentClasses = [];
        let selectedClassId = null;

        const gridContainer = document.getElementById('classes-grid');
        const classPanel = document.getElementById('class-panel');
        const searchInput = document.getElementById('class-search');
        const closePanelBtn = document.getElementById('panel-close-btn');
        const panelClassName = document.getElementById('panel-class-name');
        const buildsList = document.getElementById('builds-list');
        const tipsList = document.getElementById('tips-list');
        const countersList = document.getElementById('counters-list');
        const tabButtons = document.querySelectorAll('.tab-btn');

        const secretTrigger = document.getElementById('secret-update-trigger');
        const updateModal = document.getElementById('update-modal');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const authStep = document.getElementById('modal-auth-step');
        const syncStep = document.getElementById('modal-sync-step');
        const passwordInput = document.getElementById('secret-password');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const syncNowBtn = document.getElementById('sync-now-btn');
        const syncStatus = document.getElementById('sync-status');

        document.addEventListener('DOMContentLoaded', () => {
            loadClassesData();
            initEventListeners();
        });

        function loadClassesData() {
            // Версия v13
            const localData = localStorage.getItem('csk_classes_data_v13');
            if (localData) {
                currentClasses = JSON.parse(localData);
                renderGrid(currentClasses);
                fetchSheetsData(true); 
            } else {
                // Визуальный индикатор для новых пользователей перед началом автозагрузки
                renderEmptyState("Загрузка базы данных Кристаликса...");
                fetchSheetsData(false);
            }
        }

        function renderGrid(data) {
            gridContainer.innerHTML = '';
            if (data.length === 0) {
                renderEmptyState("Классы не найдены.");
                return;
            }

            data.forEach(cls => {
                const card = document.createElement('div');
                card.className = 'class-card';
                card.dataset.id = cls.id;
                if (cls.id === selectedClassId) card.classList.add('active');

                if (cls.icon && (cls.icon.startsWith('http://') || cls.icon.startsWith('https://'))) {
                    const img = document.createElement('img');
                    img.src = cls.icon;
                    img.alt = cls.name;
                    img.onerror = function() {
                        this.style.display = 'none';
                        card.innerHTML = `<div class="fallback-icon">${cls.name}</div>`;
                    };
                    card.appendChild(img);
                } else {
                    card.innerHTML = `<div class="fallback-icon">${cls.name ? cls.name : '??'}</div>`;
                }

                card.addEventListener('click', () => handleClassClick(cls.id));
                gridContainer.appendChild(card);
            });
        }

        function renderEmptyState(message) {
            gridContainer.innerHTML = `<div class="empty-state">${message}</div>`;
        }

        function handleClassClick(id) {
            if (selectedClassId === id) {
                closePanel();
            } else {
                selectedClassId = id;
                document.querySelectorAll('.class-card').forEach(card => {
                    card.classList.toggle('active', parseInt(card.dataset.id) === id);
                });
                openPanel(id);
            }
        }

        function openPanel(id) {
            const cls = currentClasses.find(c => c.id === id);
            if (!cls) return;

            panelClassName.textContent = cls.name;
            buildsList.innerHTML = '';
            
            let hasBuilds = false;
            if (cls.builds && cls.builds.length > 0) {
                cls.builds.forEach(b => {
                    if (b.items && b.items.length > 0) {
                        hasBuilds = true;
                        const group = document.createElement('div');
                        group.className = 'build-group';
                        group.innerHTML = `<div class="build-title">${b.title}</div>`;
                        const ul = document.createElement('ul');
                        b.items.forEach(item => {
                            const li = document.createElement('li');
                            li.innerHTML = item;
                            ul.appendChild(li);
                        });
                        group.appendChild(ul);
                        buildsList.appendChild(group);
                    }
                });
            }

            tipsList.innerHTML = '';
            if (cls.tips && cls.tips.length > 0) {
                cls.tips.forEach(t => {
                    const li = document.createElement('li');
                    li.textContent = t;
                    tipsList.appendChild(li);
                });
            }

            countersList.innerHTML = '';
            if (cls.counters && cls.counters.length > 0) {
                cls.counters.forEach(c => {
                    const li = document.createElement('li');
                    li.textContent = c;
                    countersList.appendChild(li);
                });
            }

            tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === 'all'));
            document.getElementById('block-builds').classList.toggle('hidden', !hasBuilds);
            document.getElementById('block-tips').classList.toggle('hidden', !cls.tips || cls.tips.length === 0);
            document.getElementById('block-counters').classList.toggle('hidden', !cls.counters || cls.counters.length === 0);

            classPanel.style.display = 'flex';
        }

        function closePanel() {
            selectedClassId = null;
            document.querySelectorAll('.class-card').forEach(card => card.classList.remove('active'));
            classPanel.style.display = 'none';
        }

        function switchTab(tabType) {
            tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabType));

            const cls = currentClasses.find(c => c.id === selectedClassId);
            if (!cls) return;

            const blocks = {
                builds: document.getElementById('block-builds'),
                tips: document.getElementById('block-tips'),
                counters: document.getElementById('block-counters')
            };

            if (tabType === 'all') {
                const hasBuilds = cls.builds && cls.builds.some(b => b.items.length > 0);
                blocks.builds.classList.toggle('hidden', !hasBuilds);
                blocks.tips.classList.toggle('hidden', !cls.tips || cls.tips.length === 0);
                blocks.counters.classList.toggle('hidden', !cls.counters || cls.counters.length === 0);
            } else {
                Object.keys(blocks).forEach(key => {
                    blocks[key].classList.toggle('hidden', key !== tabType);
                });
            }
        }

        function initEventListeners() {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                const filtered = currentClasses.filter(cls => cls.name.toLowerCase().includes(query));
                renderGrid(filtered);
            });

            closePanelBtn.addEventListener('click', closePanel);

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            secretTrigger.addEventListener('click', () => {
                updateModal.classList.add('flex');
                authStep.classList.remove('hidden');
                syncStep.classList.add('hidden');
                passwordInput.value = '';
                showStatus('', '');
            });

            modalCloseBtn.addEventListener('click', () => {
                updateModal.classList.remove('flex');
            });

            authSubmitBtn.addEventListener('click', () => {
                if (passwordInput.value === 'lingidan2026') {
                    authStep.classList.add('hidden');
                    syncStep.classList.remove('hidden');
                    showStatus('', '');
                } else {
                    showStatus('Неверный пароль!', 'status-error');
                }
            });

            syncNowBtn.addEventListener('click', () => fetchSheetsData(false));
        }

        function showStatus(text, className) {
            syncStatus.textContent = text;
            syncStatus.className = 'sync-status ' + className;
        }

        function cleanDriveUrl(url) {
            if (!url) return '';
            
            let cleanUrl = url.trim().replace(/["'()]/g, '').replace(/HYPERLINK/i, '');
            let fileId = '';
            
            if (cleanUrl.includes('id=')) {
                fileId = cleanUrl.split('id=')[1].split('&')[0];
            } else if (cleanUrl.includes('/file/d/')) {
                fileId = cleanUrl.split('/file/d/')[1].split('/')[0];
            }
            
            if (fileId) {
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
            }
            
            return cleanUrl;
        }

        function parseCSV(text) {
            const rows = [];
            let row = [];
            let current = '';
            let insideQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (char === '"') {
                    if (insideQuotes && nextChar === '"') {
                        current += '"';
                        i++; 
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === ',' && !insideQuotes) {
                    row.push(current);
                    current = '';
                } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                    if (char === '\r' && nextChar === '\n') {
                        i++; 
                    }
                    row.push(current);
                    rows.push(row);
                    row = [];
                    current = '';
                } else {
                    current += char;
                }
            }
            row.push(current);
            rows.push(row);
            return rows;
        }

        async function fetchSheetsData(isBackground = false) {
            if (!isBackground) {
                showStatus('Синхронизация...', 'status-loading');
            }

            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL + "&nocache=" + new Date().getTime());
                if (!response.ok) throw new Error('Ошибка доступа к Google Таблице.');
                
                const rawText = await response.text();
                const rows = parseCSV(rawText);
                
                const dataRows = rows.slice(2);
                const parsedClasses = [];
                let classIdCounter = 1;

                for (let i = 0; i < dataRows.length; i += 10) {
                    const block = dataRows.slice(i, i + 10);
                    if (!block[0] || !block[0][1] || block[0][1].trim() === "") continue;

                    const className = block[0][1].trim().replace(/["']/g, '');
                    const iconUrl = cleanDriveUrl(block[0][0]);
                    const rawCounters = block[0][8] || '';
                    const rawTips = block[0][9] || '';

                    const counters = rawCounters.split('\n').map(c => c.trim().replace(/^["']|["']$/g, '')).filter(c => c.length > 0);
                    const tips = rawTips.split('\n').map(t => t.trim().replace(/^["']|["']$/g, '')).filter(t => t.length > 0);

                    const builds = [
                        { title: "Закуп 1", items: [] },
                        { title: "Закуп 2", items: [] },
                        { title: "Закуп 3", items: [] }
                    ];

                    block.forEach(row => {
                        processBuildRow(row, 2, 3, builds[0]);
                        processBuildRow(row, 4, 5, builds[1]);
                        processBuildRow(row, 6, 7, builds[2]);
                    });

                    const activeBuilds = builds.filter(b => b.items.length > 0);

                    parsedClasses.push({
                        id: classIdCounter++,
                        name: className,
                        icon: iconUrl,
                        builds: activeBuilds,
                        tips: tips,
                        counters: counters
                    });
                }

                if (parsedClasses.length > 0) {
                    currentClasses = parsedClasses;
                    localStorage.setItem('csk_classes_data_v13', JSON.stringify(currentClasses));
                    renderGrid(currentClasses);
                    
                    if (!isBackground) {
                        showStatus('Синхронизация успешна!', 'status-success');
                        setTimeout(() => updateModal.classList.remove('flex'), 1200);
                    }
                } else if (!isBackground) {
                    renderEmptyState('В таблице не обнаружены валидные строки.');
                    showStatus('В таблице не обнаружены валидные строки.', 'status-error');
                }

            } catch (error) {
                console.error(error);
                if (!isBackground) {
                    renderEmptyState('Ошибка загрузки: ' + error.message);
                    showStatus('Ошибка импорта: ' + error.message, 'status-error');
                }
            }
        }

        function processBuildRow(row, pvpIdx, pveIdx, buildObject) {
            let pvpItem = row[pvpIdx] ? row[pvpIdx].trim().replace(/^["']|["']$/g, '') : '';
            let pveItem = row[pveIdx] ? row[pveIdx].trim().replace(/^["']|["']$/g, '') : '';

            if (pvpItem && pvpItem !== "") {
                if (pveItem && pveItem !== "") {
                    buildObject.items.push(`${pvpItem} <span class="pve-replace">→ ${pveItem} (ПВЕ)</span>`);
                } else {
                    buildObject.items.push(pvpItem);
                }
            }
        }
    </script>
</body>
</html>
